<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能面试助手</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav id="navbar" class="hidden">
  <div class="nav-inner">
    <span class="brand">智能面试助手</span>
    <div class="nav-right">
      <span id="navUsername"></span>
      <button class="btn-link" id="logoutBtn">退出</button>
    </div>
  </div>
</nav>

<main>
  <!-- 登录页 -->
  <section id="page-login" class="page active">
    <div class="card auth-card">
      <h1>智能面试助手</h1>
      <p class="subtitle">登录你的账号</p>
      <form id="loginForm">
        <div class="field">
          <label for="loginUsername">用户名</label>
          <input type="text" id="loginUsername" required autocomplete="username">
        </div>
        <div class="field">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>
        <div class="field-error" id="loginError"></div>
        <button type="submit" class="btn-primary">登录</button>
      </form>
      <p class="switch-page">还没有账号？<a href="#" data-page="register">立即注册</a></p>
    </div>
  </section>

  <!-- 注册页 -->
  <section id="page-register" class="page">
    <div class="card auth-card">
      <h1>创建账号</h1>
      <p class="subtitle">注册智能面试助手</p>
      <form id="registerForm">
        <div class="field">
          <label for="regUsername">用户名</label>
          <input type="text" id="regUsername" required autocomplete="username">
        </div>
        <div class="field">
          <label for="regEmail">邮箱</label>
          <input type="email" id="regEmail" required autocomplete="email">
        </div>
        <div class="field">
          <label for="regPassword">密码</label>
          <input type="password" id="regPassword" required autocomplete="new-password">
        </div>
        <div class="field">
          <label for="regDisplayName">显示名称（可选）</label>
          <input type="text" id="regDisplayName" autocomplete="name">
        </div>
        <div class="field-error" id="registerError"></div>
        <button type="submit" class="btn-primary">注册</button>
      </form>
      <p class="switch-page">已有账号？<a href="#" data-page="login">去登录</a></p>
    </div>
  </section>

  <!-- 仪表盘 -->
  <section id="page-dashboard" class="page">
    <div class="dashboard-container">
      <!-- 上传区 -->
      <div class="card upload-card">
        <h2>上传简历</h2>
        <form id="uploadForm">
          <div class="field">
            <label for="resumeFile">选择简历文件（PDF / DOCX / TXT）</label>
            <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" required>
          </div>
          <div class="field">
            <label for="jobDesc">职位描述（可选）</label>
            <textarea id="jobDesc" rows="4" placeholder="粘贴职位描述，以便进行匹配度分析..."></textarea>
          </div>
          <div class="field-error" id="uploadError"></div>
          <button type="submit" class="btn-primary" id="uploadBtn">开始分析</button>
        </form>
        <div class="upload-status hidden" id="uploadStatus">
          <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
          <div class="progress-label" id="progressLabel">正在分析中...</div>
        </div>
      </div>

      <!-- 结果区 -->
      <div id="resultsArea" class="hidden">
        <!-- 简历信息 -->
        <div class="card result-card" id="resumeCard">
          <h2>📋 简历信息</h2>
          <div id="resumeContent"></div>
        </div>

        <!-- 匹配分析 -->
        <div class="card result-card" id="matchCard">
          <h2>📊 匹配分析</h2>
          <div id="matchContent"></div>
        </div>

        <!-- 面试题 -->
        <div class="card result-card" id="questionsCard">
          <h2>❓ 面试题</h2>
          <div id="questionsContent"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="/static/js/app.js"></script>
</body>
</html>
